<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Learn the official IAU/USGS names, types and locations of Mars surface features on a 3D globe."
    />
    <title>Eureka Planitia/title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <button id="toggle-list" class="icon-btn" aria-label="Toggle feature list">☰</button>
        <div class="brand"><span class="brand__mark" aria-hidden="true"></span> Eureka Planitia<span class="brand__mid">·</span>Learn about Mars</div>
        <button id="recenter" type="button" aria-label="Re-center globe" title="Re-center globe">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="7"></circle>
            <line x1="12" y1="2" x2="12" y2="5"></line>
            <line x1="12" y1="19" x2="12" y2="22"></line>
            <line x1="2" y1="12" x2="5" y2="12"></line>
            <line x1="19" y1="12" x2="22" y2="12"></line>
            <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"></circle>
          </svg>
        </button>
        <input id="search" type="search" placeholder="Search features…" aria-label="Search features" autocomplete="off" />
        <div id="sync" class="sync" aria-live="polite"></div>
      </header>
      <div id="stage">
        <aside id="catalogue" aria-label="Feature catalogue">
          <div id="filters"></div>
          <div id="list" role="listbox" tabindex="0" aria-label="Features"></div>
        </aside>
        <main id="globe" aria-label="Mars globe"></main>
        <aside id="record" hidden aria-label="Feature details"></aside>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
