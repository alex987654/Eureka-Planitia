name: Build check

# Pre-merge typecheck + build. This is the project's only tsc run before deploy
# (no Node on the development machine), so PRs should stay green here before
# merging to main.
on:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check supplementary data is current
        run: python scripts/build_supplementary.py --check

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Typecheck and build
        run: npm run build
